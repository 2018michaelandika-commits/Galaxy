<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galaxy with Love Heart</title>
  <style>
    body { margin: 0; background: black; overflow: hidden; }
    canvas { display: block; }
    #overlayText {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      font-size: 32px;
      font-family: Arial, sans-serif;
      color: #ff3366;
      font-weight: bold;
      text-shadow: 2px 2px 8px #000;
    }
  </style>
</head>
<body>
  <div id="overlayText">LOVE YOU JELIITA HOTMAULI &lt;3</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Bintang
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1500;
    const positions = [];
    for (let i = 0; i < starCount; i++) {
      const x = THREE.MathUtils.randFloatSpread(200);
      const y = THREE.MathUtils.randFloatSpread(200);
      const z = THREE.MathUtils.randFloatSpread(200);
      positions.push(x, y, z);
    }
    starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // Foto dari GitHub Pages (bukan raw)
    const textureLoader = new THREE.TextureLoader();
    const photoLinks = [
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto1.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto2.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto3.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto4.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto5.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto6.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto7.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto8.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto9.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto10.jpeg",
      "https://2018michaelandika-commits.github.io/Galaxy/images/foto11.jpeg"
    ];

    const photoMeshes = [];
    photoLinks.forEach(link => {
      const texture = textureLoader.load(
        link,
        () => console.log("Loaded:", link),
        undefined,
        () => console.error("Error loading:", link)
      );
      const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
      const geometry = new THREE.PlaneGeometry(10, 10);
      const mesh = new THREE.Mesh(geometry, material);

      mesh.position.x = THREE.MathUtils.randFloatSpread(120);
      mesh.position.y = THREE.MathUtils.randFloatSpread(120);
      mesh.position.z = THREE.MathUtils.randFloatSpread(120);

      scene.add(mesh);
      photoMeshes.push(mesh);
    });

    // Bentuk hati pink
    const heartShape = new THREE.Shape();
    const scale = 1.2;
    for (let t = 0; t <= 2 * Math.PI; t += 0.01) {
      const x = scale * 16 * Math.pow(Math.sin(t), 3);
      const y = scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      if (t === 0) {
        heartShape.moveTo(x, y);
      } else {
        heartShape.lineTo(x, y);
      }
    }

    const heartGeometry = new THREE.ShapeGeometry(heartShape);
    const heartMaterial = new THREE.MeshBasicMaterial({ color: 0xff3399, side: THREE.DoubleSide });
    const heartMesh = new THREE.Mesh(heartGeometry, heartMaterial);
    heartMesh.position.set(0, -10, 0);
    scene.add(heartMesh);

    camera.position.z = 100;

    // Animasi
    function animate() {
      requestAnimationFrame(animate);
      stars.rotation.y += 0.001;
      photoMeshes.forEach(mesh => {
        mesh.rotation.y += 0.01;
      });
      heartMesh.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
